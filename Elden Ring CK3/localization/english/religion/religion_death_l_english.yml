 faith_death_prince_desc:0 "The revelations deathbed companion Fia recieved show that, one day, Godwyn will rise once again. It will finally end the purge of our kin by the fundamentalists by reintroducing Death to the Elden Ring, and he will take his rightful place as Lord of the Dead!"
 
 faith_old_death:0 "Ancient Death"
 faith_old_death_adj:0 "Ancient Rites"
 faith_old_death_adherent:0 "Death follower"
 faith_old_death_adherent_plural:0 "Death's followers"
 faith_old_death_desc:0 "Ancient rituals that separate the soul from the body, if you burn the bones of the death, it's possible to release the spirit trapped inside as ghostflame.\nIronically most of these practices are slowly dying out. the Twinbird it's their symbol and her children, the death birds, are the keepers of the ghostflame."
 