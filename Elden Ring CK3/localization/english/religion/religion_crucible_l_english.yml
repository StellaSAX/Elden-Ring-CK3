 faith_spiral_religious_symbol:0 "Spiral-Carved Amber"
 faith_spiral_desc:0 "For some lost in the Lands of Shadow the idea of being abandoned was too much to bare and in their desperation they began to seek for an answer in something new, in the end they found it in something old. Taking the Hornsent beliefs and merging it with the teachings of the Erdtree they created the Spiral Path and carved icons of the distant Erdtree onto amber, marking the ancient still warm remnants of the lost Crucible with that which would come after forever linking the two in silver light."
 
