 faith_st_trina_high_god_name_possessive:0 "Saint Trina's"
 faith_st_trina_bishop:0 "Slumberer"
 faith_st_trina_bishop_plural:0 "Slumberers"
 faith_st_trina_religious_head_name:0 "Dreamer"
 faith_st_trina_positive_afterlife:0 "the Garden of Deep Purple."
 faith_st_trina_desc:0 "Some most fortunate souls have been graced a chance meeting with the Lady of Sleep Saint Trina who brought to them such simple peace and rest that they devoted their hearts to her. In their scattered numbers a thin cult began to spread, venorating her peace and seeking to bring it to others. To that end they began to cultivate flowers that would induce a great and wakeless sleep in the hope that they and others would once again walk in the Garden of Deep Purple."

