 faith_dragon_cult_devil_name:0 "Bayle the Dread"
 faith_dragon_cult_devil_name_plural:0 "Bayle the Dread's"
 faith_dragon_cult_desc:0 "The Cult of the Ancient Dragon, despite its name, is not all that old as it was founded by Prince Godwyn when he befriended the Ancient Dragon Fortissax at the onset of the War with the Ancient Dragons. Though they were initially enemies they came together to form a mutual path of assurance, working closely together so much so that they became as close as kin and from this union the Cult began. They have worked ever since to guard Lyendell with sacred lightning and strength of arms that combines all the strengths of both man and dragon in glorious unity.

 
 