 faith_perfect_adj:0 "Perfected Order"
 faith_perfect_adherent:0 "Follower of Perfect Grace"
 faith_perfect_adherent_plural:0 "Followers of Perfect Grace"
 faith_perfect_high_god_name:0 "Elden Ring"
 faith_perfect_high_god_name_possessive:0 "Elden Ring's"
