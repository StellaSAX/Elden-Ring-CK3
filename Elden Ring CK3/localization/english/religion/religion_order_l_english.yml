 faith_perfect_high_god_name_3:0 "$faith_perfect_high_god_name$"
 faith_perfect_evil_god_name:0 "Queen Marika"
 faith_perfect_religious_head_name:0 "The Ever Brilliant"
 faith_perfect_desc:0 "Seen as both an evolution and a heresy of the Golden Order, those who believe in Perfection ascribe to the uttermost loyalty towards the Elden Ring itself but believe that it has been tainted or corrupted by Gods both of this world and of the Outer Void. They seek to cast these greater beings from any hold over the circles of the world and posit that the Elden Ring itself is the utmost power to be respected and obeyed, not any hand that might seek to control or even dare damage something that should be seen as Perfect."

 faith_messmer:0 "Messmer's Crusade"
 faith_messmer_adj:0 "Messmer's Crusade"
 faith_messmer_adherent:0 "Crusader of Messmer"
 faith_messmer_adherent_plural:0 "Crusaders of Messmer"
 faith_messmer_war_god_name:0 "Messmer the Impaler"
 faith_messmer_war_god_name_possesive:0 "Messmer the Impaler"
 faith_messmer_night_god_name:0 "Rellana"
 faith_messmer_night_god_name_possessive:0 "Rellana's"
 faith_messmer_religious_head_name:0 "Grand Crusader"
 faith_messmer_bishop:0 "High Inquisitor"
 faith_messmer_bishop_plural:0 "High Inquisitors"
 faith_messmer_desc:0 "Born out of a melding of half a dozen different beliefs and would be foes in a distant land, those who followed Messmer the Impaler eventually formed their own foundation of faith that clung less to the teachings of Grace and more to those who were fighting alongside them. With the doors to the Lands Between shut to them some have come to believe that Queen Marika has abandoned them to an endless war, whilst others still believe that they shall be welcomed home one day. Truthfully to all though the definition matters little, they still have a sacred task they will do without complaint or question."

 faith_kind:0 "Beloved"
 faith_kind_adj:0 "Beloved"
 faith_kind_adherent:0 "Beloved of Miquella"
 faith_kind_adherent_plural:0 "Beloved of Miquella"
 faith_kind_high_god_name:0 "Miquella the Kind"
 faith_kind_high_god_name_2:0 "Kindly Miquella"
 faith_kind_high_god_name_3:0 "Beloved Miquella"
 faith_kind_high_god_name_possessive:0 "Miquella's"
 faith_kind_religious_head_name:0 "Cherished"
 faith_kind_desc:0 "Born of the beauty and Grace that Miquella would share with the world, though each of them once serving a different lord or master every one who serves Kindly Miquella does so out of purest love in their heart. Miquella seeks so utterly to remake the world that he would bring a thousand year era of peace without war or bloodshed where none need know sickness or toil for what pain could there be in a world so utterly bound by love and compassion that even the will of hate would be stifled within it?"

