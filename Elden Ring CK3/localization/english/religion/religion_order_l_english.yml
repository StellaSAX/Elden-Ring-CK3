 faith_golden:0 "Golden Order"
 faith_golden_desc:0 "The many countless worshipers of all that is Golden, those who follow the Grace of Gold and the Light of the Erdtree worship Queen Marika as the one and eternal God of the Lands Between, her demigod children following close behind as beings of lesser worship alongside the Elden Lord Radagon. Though Marika has long since vanished from the world many still adhere to her order and her commandments of purity and sovereignty."
 faith_golden_adj:0 "Golden Order"
 faith_golden_adherent:0 "Follower of the Golden Order"
 faith_golden_adherent_plural:0 "Followers of the Golden Order"

 faith_fundamentalism:0 "Golden Fundamentalism"
 faith_fundamentalism_adj:0 "Golden Fundamentalism"
 faith_fundamentalism_adherent:0 "Golden Fundamentalist"
 faith_fundamentalism_ahderent_plural:0 "Golden Fundamentalists"
 faith_fundamentalism_knowledge_god:0 "Kindly Miquella"
 faith_fundamentalism_knowledge_god_adj:0 "Kindly Miquella"
 faith_fundamentalism_high_god_name_2:0 "Lord Radagon"
 faith_fundamentalism_devil_name:0 "Godwyn" 
 faith_fundamentalism_devil_name_possessive:0 "Godwyn's"
 faith_fundamentalism_religious_head_name:0 "the Ever Brilliant"
 faith_fundamentalism_desc:0 "Born not out simply of devotion to the Golden Order but also of a desire to understand it better and the base mortal world. Initially it was Radagon and Miquella who championed the quest of Fundamentalism, exploring the teachings of Regression and Causality, the force linking all things and the force pulling everything together here many great and wonderous minds have come together to hold intellect as great a virtue as faith. In more recent years however Fundamentalism has begun to fracture under the weight of the sins of the world and those that should not walk in the Light of Gold refusing the accept their place in death has grown more and more Fundamentalists to draw their swords than ever before."

 faith_unalloyed:0 "Unalloyed Gold"
 faith_unalloyed_adj:0 "Unalloyed Gold"
 faith_unalloyed_adherent:0 "Unsullied Follower of Unalloyed Gold"
 faith_unalloyed_adherent_plural:0 "Unsullied Followers of Unalloyed Gold" 
 faith_unalloyed_house_of_worship:0 "Haligchapel"
 faith_unalloyed_house_of_worship_plural:0 "Haligchapel"
 faith_unalloyed_high_god_name_2:0 "Unalloyed Miquella"
 faith_unalloyed_high_god_name_3:0 "Kindly Miquella"
 faith_unalloyed_high_god_name_possessive:0 "Miquella's"
 faith_unalloyed_war_god_name:0 "Malenia"
 faith_unalloyed_war_god_name_possesive:0 "Malenia's"
 faith_unalloyed_religious_head_name:0 "Untarnished"
 faith_unalloyed_desc:0 "When Fundamentalism was not enough to save his beloved sister from the rot within, Kindly Miquella retreated from the world and sought to water the Haligtree with his own godly blood. From this blood and bloom did the purity of Unalloyed Gold begin to spread, welcoming in all be they high or low with no place to call their own, for the Unalloyed sought to rid themselves of the taint and corruption of a sickly world and indeed even from the influence of Outer Beings who might dare to tempt them away from the Grace of Gold."
 
