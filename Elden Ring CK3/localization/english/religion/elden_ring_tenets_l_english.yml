 tenet_golden_order_name:0 "The Governing Principle"
 tenet_golden_order_desc:0 "The Golden Order, made manifest by the Elden Ring, encompasses everything - our world and the very rules dictating its functions. We followers of the Golden Order share reverence for the Erdtree, Marika and her consort."
 tenet_unalloyed_order_name:0 "The Unalloyed Order"
 tenet_unalloyed_order_desc:0 "The Golden Order has faced meddling from the Outer Gods for too long. Following Miquella, we shall reject their influence and seek a peaceful existence, not based on violence but kindness instead."
 tenet_glintstone_name:0 "The Primeval Current"
 tenet_glintstone_desc:0 "The celestial bodies, including stars and especially the moon, possess inconceivable power. We need not rely on the Erdtree and Marika but instead study the night sky. Even so we must caution against glimpsing the unknowable and forbid magic outside of glintstone sorcery."
 tenet_destroy_golden_order_name:0 "Rejecting the Order"
 tenet_destroy_golden_order_desc:0 "The Golden Order is nothing but a farce and facade masquerading a dying world. We reject their “fundamental” laws! We will destroy the Order so a new world can be born in its ashes."
 tenet_golden_exile_name:0 "The Crusade"
 tenet_golden_exile_desc:0 "The Flame can be sacred when used against those who fall outside of the Erdtree’s grace. Our sacred mission from Marika remains: burn the Hornsent and impale the Divine Beasts! Not until then can we return to the Lands Between. "
 tenet_live_in_death_name:0 "Those Who Live in Death"
 tenet_live_in_death_desc:0 "We who have been touched by the Rune of Death patiently await the return of our Lord; Godwyn, the Prince of Death. With both halves of the Runes of Death united, we shall correct the flawed Elden Ring to instill the Those Who Live in Death in it!"
 
 tenet_dragon_cult_name:0 "Dragon Worship"
 tenet_dragon_cult_desc:0 "Long ago, Godwyn the Golden defeated the ancient dragon Fortissax, and befriended his fallen foe. The worship of the ancient dragons does not conflict with belief in the Erdtree. After all, lightning itself is imbued with gold."
 
 tenet_golden_order_syncretism_name:0 "Linked with Gold"
 tenet_golden_order_syncretism_desc:0 "The Golden Order is pliable enough to absorb practices that contradicted itself. As long as they are willing to kneel to it and accept it's God as an absolute ruler."
 