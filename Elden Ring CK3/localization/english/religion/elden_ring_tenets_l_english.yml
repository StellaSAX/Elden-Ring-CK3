l_english:
 
 tenet_primordial_curse_name:0 "Blessing of the Crucible"
 tenet_primordial_curse_desc:0 "The primordial crucible is both a curse and a blessing, of evolution and vitality. Those with it's traits: Horns, Scales, Wings, Breath, Feathers, Tail and Fangs are seen as divine."
 
 doctrine_parameter_hostility_override_special_doctrine_is_dragon_faith:1 "Dragon [faiths|E] are considered only [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V]"
 doctrine_parameter_is_dragon_faith_bilateral_loc_override:0 "Considers Dragon [faiths|E], and is considered by Dragon $game_concept_faiths$, to be [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V] instead of $hostility_evil_tooltippable$"
