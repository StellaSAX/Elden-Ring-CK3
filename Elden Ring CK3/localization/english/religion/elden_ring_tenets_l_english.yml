 doctrine_parameter_hostility_override_special_doctrine_is_golden_faith:1 "Order [faiths|E] are considered only [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V]"
 doctrine_parameter_is_golden_faith_bilateral_loc_override:0 "Considers Order [faiths|E], and is considered by Order $game_concept_faiths$, to be [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V] instead of $hostility_evil_tooltippable$"
