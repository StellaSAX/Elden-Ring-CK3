l_english:
 
 faith_rot:0  "Rot Order"
 faith_rot_desc:0 "The Rot Order is a blanket term for any number of sects that worship the Outer God of Rot, an inscrutable entity associated with death, decay, and rebirth. The servants of Rot see the boiling red affliction cast on them by their master as a blessing that could create life from death and grant rebirth to those who submit to it. In ancient times, practitioners would let their infected bodies become encrusted by mushrooms which they saw as a means of binding themselves to the earth and to that most sacred process of decay. In time, however, their god would be sealed away, and the servants of Rot would soon learn that their new master wanted nothing to do with them."
 faith_rot_adj:0 "Rot Order"
 faith_rot_adjerent_singular:0 "Servant of Rot"
 faith_rot_adherent_plural:0 "Servants of Rot"