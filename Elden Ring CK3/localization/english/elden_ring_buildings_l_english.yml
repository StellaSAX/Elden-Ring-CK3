  building_dragon_temple_01: "Dragon Temple"
  building_dragon_temple_desc_01: "The great and ancient Dragon Temple of Farum Azula is one of the best preserved areas of the ancient city. Though its ancient use has been lost to history, it may yet be repaired and reclaim its place as the greatest temple of the Lands Between." 

