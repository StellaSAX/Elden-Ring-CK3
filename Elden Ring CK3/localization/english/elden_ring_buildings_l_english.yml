  building_placidusax_throne_01: "Throne of Palcidusax"
  building_placidusax_throne_desc_01: "Here, at the heart of Farum Azula, stands the great seat of Dragonlord Palcidusax. Though, like the rest of the ancient city, it fell into disrepair, it may one day once more be a seat worthy of a king - or perhaps even a god."

