  trait_carian_sorcerer_neutral:0 "Carian Sorcerer"
  trait_carian_sorcerer_neutral_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] has mastered the royal art of Carian sorcery, becoming adept at summoning projectiles and weapons matching even the Order’s strength."
  trait_carian_sorcerer_male:0 "Carian Sorcerer"
  trait_carian_sorcerer_male_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] has mastered the royal art of Carian sorcery, becoming adept at summoning projectiles and weapons matching even the Order’s strength."
  trait_carian_sorcerer_female:0 "Carian Sorceress"
  trait_carian_sorcerer_female_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] has mastered the royal art of Carian sorcery, becoming adept at summoning projectiles and weapons matching even the Order’s strength."

  trait_shadowbound_beast:0 "Shadowbound Beast"
  trait_shadowbound_beast_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] is an ever loyal servant to [ROOT.GetCharacter.GetHerHis] master Empyrean, sworn to aid them through their ascension to godhood, or to stop them if they falter."

  trait_scarlet_rot_child:0 "Child of the Rot"
  trait_scarlet_rot_child_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] is a child of Rot, having been born from a sprouting bud in the heart of Caelid."

  trait_bodiless:0 "Bodiless"
  trait_bodiless_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] is without body, existing as a drifting spirit bound to Grace."

  trait_god_elden_ring_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] is a God, a being of great power that will cause an impact on the world."
  trait_demigod_elden_ring_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] is the descendant of a God, in their blood exist the potential for greatness."
  trait_demigod_elden_ring_1_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] is the descendant of a God, in their blood exists the potential for greatness."
  trait_demigod_elden_ring_2_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] carries the sacred blood of a God, their lineage marked by undeniable grace and quiet power."
  trait_demigod_elden_ring_3_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] bears the potent blood of a God, their very presence a reminder of divine authority and ancient might."
  trait_demigod_elden_ring_4_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] stands as near to godhood as one may without ascending, the divine blood within them burning bright and terrible."
  trait_empyrean_elden_ring_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] was Chosen by the two fingers to have the potential to become a God, but for now they are a natural leader."
  trait_eternal_youth_elden_ring_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] was born with a condition that make them incapable of growing their body."
  trait_shardbearer_elden_ring_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] has a fragment of the elden ring, giving them great power."

  become_god_elden_ring.0001.desc:0 "After much effort i have finally reach the pinacle of power, it's only a matter of time until the world bends to my will."
  become_god_elden_ring.0001.title:0 "The Birth of a God"
  become_god_elden_ring.0001.a:0 "Tremble before me"

  GOD_INVASION_CB_NAME:0 "God Conquest"
  GOD_INVASION_WAR_NAME:2 "$ORDER$ Godly Invasion of [TITLE.GetBaseName]"
  GOD_INVASION_WAR_NAME_BASE:0 "[ATTACKER.GetPrimaryTitle.GetAdjective][DEFENDER.GetPrimaryTitle.GetName]"

  trait_golden_knight:0 "Golden Knight"
  trait_golden_knight_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] is a Knight that believes in Order, trained in the art of defence."

  trait_mounted_knight:0 "Mounted Knight"
  trait_mounted_knight_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] is a Knight that Specializes in mounted combat."

  trait_crucible_knight:0 "Crucible Knight"
  trait_crucible_knight_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] is a Knight that uses the power of the Crucible to fight, being more dangerous that most warriors."

  trait_mausoleum_knight:0 "Mausoleum Knight"
  trait_mausoleum_knight_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] is a Knight that follows their master even in death, and can survive most injuries."

  trait_sorcerous_knight:0 "Sorcerous Knight"
  trait_sorcerous_knight_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] is a Knight that controls sorcery to defeat their enemies, and has learned to observe the stars."

  trait_bloodhound_knight:0 "Bloodhound Knight"
  trait_bloodhound_knight_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] is a Knight that specializes in agility, hunting and tracking, know to be extremely loyal."

  trait_rot_knight:0 "Rot Knight"
  trait_rot_knight_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] is a Knight that is resistant to and controls the Rot, can surivive terrible infecions with ease."

  trait_frenzied_knight:0 "Frenzied Knight"
  trait_frenzied_knight_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] is a Knight that has been blessed by the flame of frenzy, they fight in a crazed and aggresive way."

  trait_cuckoo_knight:0 "Cuckoo Knight"
  trait_cuckoo_knight_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] is a Knight that failed to learn real sorcery, but uses tools that imitate them, they don't have much potential."

  trait_drake_knight:0 "Drake Knight"
  trait_drake_knight_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] is a Knight that has learned to consume and use the power of Lesser Dragons, that power may become their undoing if they overindulge."

  trait_death_knight:0 "Death Knight"
  trait_death_knight_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] is a Knight that has a conection to a Outer God of death, they are resistant to sickness and are protected from death."

  trait_ice_knight:0 "Ice Knight"
  trait_ice_knight_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] is a Knight that has control over ice and snow, they move like a hail and hit like an avalanche, they are a master of winter."


