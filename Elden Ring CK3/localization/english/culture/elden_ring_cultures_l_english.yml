cul_messmer_followers_desc: "#size:15 Calling the followers of the exile demigod one people would be doing them a disservice, for in their ranks all true aspirants of the Golden Order could be found. Here the loyal warriors of Marika found themselves shoulder to shoulder with the fractious Liurnian's, the beasts of Caelid and even stranger allies beside. In the long years lost in the Lands of Shadow these lines have slowly blurred into one people.#!"

