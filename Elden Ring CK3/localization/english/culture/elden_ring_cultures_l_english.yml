cul_liurnia_desc: "#size:15 Similar to their Carian cousins, Liurnians have a love of wonderous structures and knowledge, though their similarities quickly fade after this point. They enjoy a land of riches and wonders, just as much as they do dangers and risks. Stubborn in their pursuits, many Liurnians will turn to one obsession or another and delve deep into it. They are naturally a people drawn apart by their own personal ambitions and drawn together by the shared love of their wonderous homeland.#!"


