cul_reedlander_desc: "#size:15 Though certainly strangers to the Lands Between, those children of the Land of Reeds are no strangers to blood. Their distant home has long been caught in a war so bitter and brutal none can now remember its origin. Perhaps it is because of this that those born of this lineage seem almost drawn to the sickly sweet call of Blood.#!"

