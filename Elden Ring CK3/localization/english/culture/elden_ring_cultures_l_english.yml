cul_limgrave_desc: "#size:15 The people of Limgrave stand ever at a crossroads of the past and the present, their homes built on and around the ruins of those that came before. Perhaps this appreciation for what was gives them a certain zeal to protect that which is and treasure it in equal measures. They are a numerous people and easily counted as some of the most loyal, when they have a cause to turn to.#!"


