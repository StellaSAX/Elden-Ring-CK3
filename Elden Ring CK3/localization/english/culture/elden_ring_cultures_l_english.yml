 cul_landsbetween_desc:0 "#size:15 At times it is rare and at times it is common for one to call themselves a Child of the Lands Between before any other loyalty, perhaps it is because of this that to some it is seen as a declaration of utmost solidarity and loyalty. Foreswearing all blood ties and heritage to that which came before, now only the love of the Golden Order has brought them together and whilst they may be far from its roots they have bathed deep in the light of the Erdtree and name themselves the most loyal of its protectors.#!"
 cul_badlands_desc:0 "#size:15 Though distant and bereft of Grace the Badlands holds a beauty of its own and this can be found in its people. Those either driven from the Lands Between or hailing from this harsh realm are noted for their strength and physical prowess, being great warriors in their own right and enjoying a fierceness that is almost closer to beast than man. Many have underestimated their great might as a sign of weakness of mind, but few would do so when such a titan as Hoarah Loux stands proud as one of their number.#!"
 cul_giant_desc:0 "#size:15 Physically vast and imposing, each and every giant is as tall as a castle wall and as mighty as an army in their own regard. Though some would consider them wild and untamed they would defy such expectations for whilst they rarely build it is perhaps simply because the world is not large enough to be able to bear the weight of their mighty constructs for long. Even a single giant is a strength beyond measure and most are glad indeed that they prefer the company of their own kind on distant mountains, for some believe it is the might of giants alone that could fell even the splendour of Gold.#!"
 cul_reedlander_desc:0 "#size:15 Though certainly strangers to the Lands Between, those children of the Land of Reeds are no strangers to blood. Their distant home has long been caught in a war so bitter and brutal none can now remember its origin. Perhaps it is because of this that those born of this lineage seem almost drawn to the sickly sweet call of Blood.#!"
 cul_draconian_desc:0 "#size:15 Legends say that before any other life within the Lands Between there were the ancient dragons who trascended time and worlds themselves. Be that truth or fiction, the answer is lost to time itself, what is certain however that humans have dwelt in the shadow of scaled wings for many generations and it is from this reign the Draconians were born. Now a people with no true home to call their own and lost for a calling, they often wander the world seeking out the might of dragons, perhaps called to it by some long distant part of their ancestory seeking kinship with that which was lost.#!"
 cul_nightfolk_desc:0 "#size:15 In truth nobody knows the origin of the myserious Nightfolk, they have been found in many places and rare in number. Once said to bleed sliver and believed to be descendants of ancient Nox, or even some mixing of man and Albinauric. Whatever the truth of their origin it seems to matter little for them, though strange to first see they indeed are and often seen as outsiders it cannot be dissuaded from many just how true their potential is. Man Nightfolk walk their own path, some unseen by others and some marked by Grace of Gold, but all have something about that that is unmarked by most. For perhaps in not having a past as others would know it they have chanced upon a limitless future.#!"
 cul_numen_desc:0 "#size:15 Rarely born, the Numen are perhaps one of the most enigmatic of peoples found in the Lands Between. Claiming to home some relation to Queen Marika, the Numen are gifted with exceptional long lives. In truth, they are not even beings who originate in the Lands Between, originally hailing from a distant land which if it has a name there are no records of it and the truth of such a thing they keep a close guarded secret even to themselves. The sight of a Numen is often considered both a blessing and an omen, for it is usually a sign of great change is coming for them to gather in one place with such a long life to experience all the wonders of the world.#!"
 cul_astrologer_desc:0 "#size:15 Drawn together less by shared blood and more by shared ideals, Astrologers are known for their distinct fascination with the stars. Many of their number attempt to predict the turning of the cycle of the world from those distant lights, whilst others delve deep into the earth to study their starfallen remnants. What is certain however amongst them all is their skills of intelligence and reason, leaving many with an almost natural gift for Glintstone magic, which is a door to many deeper mysteries in itself.#!"
 cul_ancenstral_followers_desc:0 "#size:15 A strange and mysterious people, these horned warriors have long since shunned the Grace of the Erdtree and indeed even the arts of metal working and letters altogether. Whilst they are seen as more primal or perhaps even primitive by those who dwell on the surface it cannot be denied that they posses a certain beauty about them. Be it their connection to their spiritual guardians, their raw strength or even the strange skills they have to walk unseen. Only a fool would be quick to dismiss them as primitive without truly knowing their strength.#!"
 cul_hornsent_desc:0 "#size:15 Once a proud and mighty people who ruled over an empire so great nothing in their lands could trouble them, they are now little more than a shadow of their former glory. For whilst they could find no threat in their own realm it would be the arrival of enemies long cast out that would drive the Hornsent back from their place of power and glory. A deeply spiritual people with a depth of knowledge of many Outer Gods, they once had a mastery of the high mysteries, now they languish under the tyranny of Messmer's flame, awaiting a day when they may rise again to restore that which they have lost.#!"
 cul_limgrave_desc:0 "#size:15 The people of Limgrave stand ever at a crossroads of the past and the present, their homes built on and around the ruins of those that came before. Perhaps this appreciation for what was gives them a certain zeal to protect that which is and treasure it in equal measures. They are a numerous people and easily counted as some of the most loyal, when they have a cause to turn to.#!"
 cul_weeping_peninsula_desc:0 "#size:15 Often dismissed as just another part of Limgrave, the Weeping Peninsula carries its own rich history, as seen in the people who dwell within. Though perhaps enjoying a more simple life, it can rarely be said that there is a more pious group of people in all the Lands Between, for their lands are dotted with many churches, temples or the remnants of previous structures of the same name who have fallen out of repair. Even Castle Morn, built at their hands, was once built in spite of the Grace of the Erdtree as well for its strategic position, for security of the soul is also security of the self.#!"
 cul_caelid_desc:0 "#size:15 The people of Caelid value simplicity over splendour, their lands are harsh and strained with threats being ever present. Many young Caelidian's are well aware of the danger of beast and brigand so it should come as no surprise that this is a people of warriors, dwelling in grand castles and fortifications that can keep the worst of the world at bay. They do not lack for strength in arms however and may indeed be some of the most prized armies in all of the Lands Between."
 cul_altus_desc:0 "#size:15 Dwelling in the shade of the Erdtree has given the Altus Plateau a sense of security that is shared in its people, they are haughty and noble, enjoying comfortable lives just within sight of the capital. Many minor Erdtrees can be found scattered throughout their lands which has naturally led to the people here feeling they are almost as saintly as those in the capital city of Leyndell. This is truly a people who enjoy the comforts of a peaceful life whilst perhaps not having to work for it as hard as others, after all, the bounty was already laid before them before they were born.#!"
 cul_gelmir_desc:0 "#size:15 Those who dwell high on Mount Gelmir have ever been close to each other, in violence more often than not, for despite resources being thin high up on their home they still find great cause to distrust each other. Hailing from a harsh land of sulphurous rock and boiling water has made them hardy and quick to remove themselves from anything that might endanger their existence, earning them a reputation for survivability and disloyalty in equal measures.#!"
 cul_zamor_desc:0 "#size:15 Tall and slender with hair as pale as silver, the Zamor have long since adapted to living well in the harsh cold of their frozen home. Waring often with the giants of Flame Peak it should come as no surprise then that these enigmatic figures have learned well how to wield a master of ice and snow. Often they stalk alone in a blizzard, sometimes even of their own making, guarding their homes well for they know only Zamor as a place where they can dwell in peace.#!"
 cul_follow_messmer_desc:0 "#size:15 Calling the followers of the exiled demigod one people would be doing them a disservice, for in their ranks all true aspirants of the Golden Order could be found. Here the loyal warriors of Marika found themselves shoulder to shoulder with the fractious Liurnian's, the beasts of Caelid and even stranger allies beside. In the long years lost in the Lands of Shadow these lines have slowly blurred into one people.#!"
 cul_dragonbarrow_desc:0 "#size:15 Seperated from Caelid by only a thin span and yet distinct enough to be their own people, those who dwell in Dragonbarrow know well it has earned its name for here the mightiest of dragons can be found in numbers not see in ages. They are well protected from the plights of the world and prefer the company of their own kind, wild and untamed and few in number, only those truly cunning and vicious can survive long in the home they have made for themselves.#!"
 cul_farum_desc:0 "#size:15 Outcasts in time and in the world, the legacy of ancient Farum Azula is one long lost to time, for they were perhaps the first and greatest of civilisations in the early annuls of the world. Here in this floating city resides the last remnants of an ancient empire of mighty dragons and their lords serving still under a forgotten God. Now they await either the return of that which has long since left the circles of the world or perhaps even the very end of all things in their silent prison of their own making.#!"
 cul_jagged_desc:0 "#size:15 When Bayle the Dread rebelled against the ancient Dragonlord his defeat signalled the start of a war between dragon and drake that would rage on into eternity. In order to survive and make a home for themselves they fled to the Lands of Shadow, drake and drake warrior alike and in short order began to set upon each other. They are a people who value only what they can take and hold and will devour anything they deem they must in order to go stronger for it.#!"
 cul_nox_desc:0 "#size:15 Long ago the Nox of old transgressed against the Greater Will and its servant Fingers by forging helms of glass to ward away its intentions. Ever since they have dwelled deep beneath the earth under a sky of false stars and made a home anticipating the dawn of an Age of Stars. They are a people who crave independence from Outer Gods so utterly they would diverge themselves of even the light of the sun in the hopes that they may one day see a freedom given to all beings to chose their own path in the service of the Lord of Night.#!"
 cul_frezyhorn_desc:0 "#size:15 Deep within the Abyssal Woods these poor souls have had the great misfortune and duty to stand watch over the vile corruption that lingers within, ordered to be sealed away lest what they know and what they guard escapes to where it should not. They are marked with something of an utter dread about them for even in this most hideous of places even spirits may day and should one wander too deep and too long in the forest madness may take them as madness may take the world.#!"
 cul_shaman_desc:0 "#size:15 Descendants of the Numen, the shamans are beautiful to behold and utterly rare indeed. Their long lifespan, great intelligence and spirituality made them something beyond most understanding to witness and indeed even their very flesh was something able to be warped and moulded as easily as fresh clay, something the Hornsent discovered much to their own glee. Many of the Shaman were forced into Sainthood by being interred into saintly jars and bound together with their own and lesser flesh, now if any live free of this cursed life it is not known. Though however the truest and most wonderous of their lineage is doubtless known to all for she is Queen Marika and she is Eternal.#!"
 cul_royal_desc:0 "#size:15 Those who dwell within the glorious capital of Leyndell have been known by many names: Noble, Royal, Demigod, all are true and yet none are fully accurate. In truth all who live in the shadow of the Erdtree consider themselves to be greater than normal men, looking down on those in the valleys bellow with a sense of utter self importance. For they are the highest and most noble that any one can be without first becoming something beyond the bounds of humanity.#!"
 cul_northerner_desc:0 "#size:15 A tall and hardy people with stern faces and broad shoulders, it should hardly come as a surprise to any that they are typically found in the distant northern mountains of the Lands Between. It is said that they originate in the children of giants and perhaps there is some truth to it, for they are pale and tall and strong indeed like the giants of old and perhaps some legacy of that old strength guides them still.#!"
 cul_liurnia_desc:0 "#size:15 Similar to their Carian cousins, Liurnians have a love of wonderous structures and knowledge, though their similarities quickly fade after this point. They enjoy a land of riches and wonders, just as much as they do dangers and risks. Stubborn in their pursuits, many Liurnians will turn to one obsession or another and delve deep into it. They are naturally a people drawn apart by their own personal ambitions and drawn together by the shared love of their wonderous homeland.#!"
 cul_caria_desc:0 "#size:15 Dwelling in the mountains of Caria have given this people a misbegotten reputation of wild independence and disdain for those that dwell below. This could not be further from the truth, for whilst they are mistrustful of outsiders they are fiercely loyal to their own and deeply love perhaps more than most other people. They consider themselves somewhat detached from the plights of the world beyond their mountains and whilst this may make them seem standoffish to those not in their kindred, to earn the loyalty of a Carian is to earn a lifetime of loyalty from the most noble of souls.#!"
 cul_sellia_desc:0 "#size:15 Sellian's have an utterly fearsome reputation for their skills with sorcerery, being able to understand and control such a variety and depth that any and all masteries may be found within their walled city. Said to be descendants of the terrible Nox who returned to the surface, if this is the truth they brought with them the magical might of an age and most would be well to remember that it is not the guardians of the Erdtree that hunt down wayward sorcerers but Sellian's themselves.#!"
 cul_eochaid_desc:0 "#size:1 5Truly little is known of the Eochaid, if that is even their name or simply the land from which they hail. They come from a distant land beyond the Lands Between and seem to have an innate distrust of other, preferring to wander the world alone. They also seem to possess an utterly rigid and dogmatic sense of justice, rather of the personal kind rather than the legal sense and will dedicate themselves to hunting down those they view as sinners. Worrying still is their unusual skill of copper and rust magics. Even a single Eochaid is cause for concern, for if just one can cause such devastation many would fear what an army might do if they could stand their own presences for long enough to form one.#!"
 cul_beast_desc:0 "#size:15 In truth Beasts are not one people and they take many forms, from more savage to almost human. They tend to remain in small groups or else remain entirely on their own, for not all places in the world are welcoming of their presence. Many Beasts have attached themselves as vassals to a greater power of one form or another in order to survive and with that loyalty comes an utter viciousness. No two regions Beasts will be entirely alike, throwing many would be adventurers braving their nests to an early doom as overconfidence becomes a slow and insidious killer.#!"


